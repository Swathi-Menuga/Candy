<!DOCTYPE html>
<html>
<head>
<title>For My Future Husband ❤️</title>

<style>
body {
    margin: 0;
    padding: 0;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    overflow: hidden;
    font-family: 'Georgia', serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.frame {
    background: white;
    padding: 40px;
    border-radius: 25px;
    border: 8px solid #ff2e63;
    text-align: center;
    box-shadow: 0 0 40px rgba(255, 46, 99, 0.7);
    animation: glow 2s infinite alternate;
    z-index: 2;
    width: 400px;
}

@keyframes glow {
    from { box-shadow: 0 0 20px #ff2e63; }
    to { box-shadow: 0 0 50px #ff0055; }
}

h1 {
    color: #ff0055;
}

/* IMAGE STYLE */
.photo {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    object-fit: cover;
    border: 5px solid #ff2e63;
    margin-bottom: 15px;
}

button {
    background-color: #ff2e63;
    color: white;
    padding: 12px 25px;
    border: none;
    border-radius: 10px;
    font-size: 18px;
    cursor: pointer;
}

button:hover {
    background-color: #ff0055;
}

#message {
    display: none;
    margin-top: 20px;
    font-size: 18px;
    color: #444;
}

/* Falling Hearts */
.heart {
    position: absolute;
    animation: fall linear infinite;
}

@keyframes fall {
    0% { transform: translateY(-10vh); }
    100% { transform: translateY(110vh); }
}
</style>
</head>

<body>

<!-- Background Music (No autoplay) -->
<audio id="bgMusic" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<div class="frame">

    <!-- ADD YOUR IMAGE HERE -->
    <!-- <img src="YOUR_IMAGE_LINK_HERE" class="photo"> -->

    <h1>Happy Birthday My Love ❤️</h1>

    <button id="openBtn" onclick="showMessage()">Open My Heart 💌</button>

    <div id="message">
        You walked into my life as a surprise,<br><br>
        but you stayed as my destiny.<br><br>
        Today you are my boyfriend…<br>
        Tomorrow you will be my husband 💍<br><br>
        I can’t wait to build our forever together.<br><br>
        I love you endlessly ❤️
    </div>
</div>

<script>
<script>
function showMessage() {
    // Show message
    document.getElementById("message").style.display = "block";

    // Hide button permanently
    document.getElementById("openBtn").style.display = "none";

    // Play music (if you have audio id="bgMusic")
    var music = document.getElementById("bgMusic");
    if (music) {
        music.play();
    }
}

/* Create falling hearts */
function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (Math.random() * 3 + 2) + "s";
    heart.style.fontSize = (Math.random() * 20 + 20) + "px";
    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 5000);
}

setInterval(createHeart, 300);
</script>

</body>
</html>
